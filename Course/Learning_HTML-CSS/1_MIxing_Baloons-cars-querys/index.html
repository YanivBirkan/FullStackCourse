<script>
  function onDoIt(ev){
    console.log("clicked");

    document.querySelector(".box").innerText = 'See MSG >>>';
    flashMsg("this is a hidden msg");
  }
  

  function flashMsg(msg){
    let elUserMsg = document.querySelector(".user-msg");
    elUserMsg.innerText=msg;
    elUserMsg.hidden=false;
    setTimeout( ()=>{
      elUserMsg.hidden = true
    },2250);

  }

  function onSend(elSentBtn){
    console.log("sending...");
    elSentBtn.innerText= "Sending..."
  }
</script>
