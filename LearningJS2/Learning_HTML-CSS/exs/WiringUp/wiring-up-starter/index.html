<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try Stuff</title>
    <link rel="stylesheet" href="css/main.css" />
    <script src="js/main.js"></script>

  </head>

  <body onkeyup="onHandleKey(event)" onload="onInit(this)">
    <h1>I like JS</h1>
    <h2>its so... <span></span></h2>
    <div class="box">
      <p>
        Do the <span onclick="onChangeSubHeader(this)">difficult</span> things
        while they are <span onclick="onChangeSubHeader(this)">easy</span> and
        do the great things while they are small. A journey of a thousand miles
        must begin with a single step.
      </p>
      <img
        src="img/ninja.png"
        onclick="onImgClicked()"
        onmouseenter="onMouseEnter(this)"
        onmouseleave="onMouseLeave(this)"
        alt="ninga"
      />
    </div>

    <button onclick="onMark(this)">Mark</button>
    <button onclick="onBless()">Bless</button>

    <div class="modal">
      <button type="button" onclick="onCloseModal()">x</button>
      <h2>Easy (Kal)</h2>
    </div>

  </body>
</html>
